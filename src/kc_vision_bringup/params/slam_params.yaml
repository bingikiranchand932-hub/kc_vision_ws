slam_toolbox:
  ros__parameters:
    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_region_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    mode: mapping # Set to 'localization' later when you just want to navigate

    # If you have issues with TF timing, set this to true
    use_map_saver: true

    # Map Parameters
    map_resolution: 0.05 # 5cm per pixel, good for grass cutters
    map_update_interval: 2.0 # Update the map every 2 seconds
    resolution: 0.05
    max_laser_range: 10.0 # Your YDLiDAR max range from previous config
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000

    # Matcher Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.3 # Robot must move 30cm before processing a new scan
    minimum_travel_heading: 0.3 # Robot must rotate ~17 degrees before processing a new scan
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1  
    link_scan_maximum_distance: 1.5